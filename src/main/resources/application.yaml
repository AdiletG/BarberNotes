server:
  port: 8101

spring:
  application:
    name: BarberNotes
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/DB_BarberNotes
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  liquibase:
    change-log: classpath:db/changelog/master.yaml

  jpa:
    hibernate:
        ddl-auto: validate

logging:
    level:
      org.springframework.security: DEBUG
      root: info
      kg.job.jobsearch: debug
      com.zaxxer.hikari: error
      org.apache.tomcat: error
      liquibase: info
    file:
      path: logs
    pattern:
      file: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"
